name: Velocity

defaults:
  # see https://hydra.cc/docs/advanced/overriding_packages/
  - /base/env_base@_here_
  - /base/sim_base@_here_

env:
  num_envs: 4096
  max_episode_length: 800

sim:
  dt: 0.005
  substeps: 4

randomization:
  train:
    base_mass: [0.7, 1.3]
    motor:
      p_gains: [0.7, 1.3]
      d_gains: [0.7, 1.3]
    payload_mass: [0.05, 0.5]
    legs_mass: [0.7, 1.3]
  eval:
    base_mass: [0.7, 1.3]
    motor:
      p_gains: [0.7, 1.3]
      d_gains: [0.7, 1.3]
    payload_mass: [0.05, 0.5]
    legs_mass: [0.7, 1.3]

action_scaling: 1.0
command_interval: 250
time_encoding: false

force_sensor: ["base", "calf", "thigh"]

priv_obs: 
  - base_mass
  - payload_mass
  # - legs_mass
  - base_linvel
  - applied_torques
  - feet_pos
  - feet_vel
  - feet_height
