name: Track

defaults:
  # see https://hydra.cc/docs/advanced/overriding_packages/
  - /base/sim_base@_here_

num_envs: 4096
max_episode_length: 800

robot: a1
terrain: plane

randomization:
  train:
    base_mass: [0.7, 1.3]
    motor:
      p_gains: [0.7, 1.3]
      d_gains: [0.7, 1.3]
    payload_mass: [0.05, 0.5]
    # legs_mass: [0.7, 1.3]
  eval:
    base_mass: [0.7, 1.3]
    motor:
      p_gains: [0.7, 1.3]
      d_gains: [0.7, 1.3]
    payload_mass: [0.05, 0.5]
    # legs_mass: [0.7, 1.3]

action_scaling: 0.5
command_interval: 250
command_speed: [0.4, 2.4]
history_length: 32
