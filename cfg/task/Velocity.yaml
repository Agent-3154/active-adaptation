name: Velocity

defaults:
  # see https://hydra.cc/docs/advanced/overriding_packages/
  - /base/env_base@_here_
  - /base/sim_base@_here_

env:
  num_envs: 4096
  max_episode_length: 800

sim:
  dt: 0.005
  substeps: 4

randomization:
  train:
    base_mass: [0.7, 1.3]
    motor:
      p_gains: [0.7, 1.3]
      d_gains: [0.7, 1.3]
    payload_mass: [0.05, 0.5]
    # legs_mass: [0.7, 1.3]
  eval:
    base_mass: [0.7, 1.3]
    motor:
      p_gains: [0.7, 1.3]
      d_gains: [0.7, 1.3]
    payload_mass: [0.05, 0.5]
    # legs_mass: [0.7, 1.3]

action_scaling: 1.0
command_interval: 250
command_speed: [0.4, 2.4]
time_encoding: false

priv_obs: 
  - base_mass
  - payload_mass
  # - legs_mass
  - base_height
  - base_linvel
  - applied_torques
  - feet_pos
  - feet_vel
  - feet_height

reward:
  linvel: 2.0
  heading: 0.25
  base_height: 0.5

  # lin_vel_z_l2: 2.0
  # ang_vel_xy_l2: 0.05
  flat_orientation_l2: 2.0
  # dof_torques_l2: 0.000025
  # dof_acc_l2: 2.5e-7
  # action_rate_l2: 0.01
  energy: 0.0005