# @package task

name: OrcaFlat
task: Humanoid

defaults:
  # see https://hydra.cc/docs/advanced/overriding_packages/
  - /task/Velocity@_here_
  - override /task/action@action: null
  - _self_

robot:
  name: cy1
  stiffness: 
    "waist_yaw_joint": 75.
    "[l,r]arm_joint1": 75.
    "[l,r]arm_joint2": 50.
    "[l,r]arm_joint3": 30.
    "[l,r]arm_joint4": 30.
    "[l,r]arm_joint5": 15.
    "[l,r]arm_joint6": 15.
    "[l,r]leg_joint1": 75.
    "[l,r]leg_joint2": 50.
    "[l,r]leg_joint3": 50.
    "[l,r]leg_joint4": 75.
    "[l,r]leg_joint5": 30.
    "[l,r]leg_joint6": 15.
  damping:
    "waist_yaw_joint": 3.
    "[l,r]arm_joint1": 6.
    "[l,r]arm_joint2": 3.
    "[l,r]arm_joint3": 1.
    "[l,r]arm_joint4": 1.
    "[l,r]arm_joint5": 1.
    "[l,r]arm_joint6": 1.
    "[l,r]leg_joint1": 6.
    "[l,r]leg_joint2": 3.
    "[l,r]leg_joint3": 3.
    "[l,r]leg_joint4": 6.
    "[l,r]leg_joint5": 2.
    "[l,r]leg_joint6": 1.
  effort_limit:
    "waist_yaw_joint": 36
    "[l,r]arm_joint1": 94.
    "[l,r]arm_joint[2-5]": 36
    "[l,r]leg_joint[1,4]": 150
    "[l,r]leg_joint[2,3]": 94
    "[l,r]leg_joint[5,6]": 36

terrain: orca_loco
payload: false

action:
  _target_: active_adaptation.envs.mdp.action.JointPosition
  action_scaling:
    waist_yaw_joint: 0.8
    .*arm_joint[1-4]: 0.25
    .*leg_joint[1-4]: 0.8
    .*leg_joint[5-6]: 0.25
  max_delay: 1
  alpha: [0.5, 0.8]
  # cumstom_command: {.*arm_joint4: 0.3}

command:
  _target_: active_adaptation.envs.mdp.OrcaLocoCommand
  linvel_x_range: [0., 1.5]
  linvel_y_range: [-0.1, 0.1]
  angvel_range: [-2.0, 2.0]
  yaw_stiffness_range: [0.8, 1.2]
  use_stiffness_ratio: 1.0
  stand_prob: 0.05
  
observation:
  command:
    command:
    phase: {cycle_range: [0.9, 1.1], deriv: true}
  policy:
    root_angvel_b:  {noise_std: 0.05}
    projected_gravity_b: {noise_std: 0.01}
    # joint_pos: {noise_std: 0.05, subtract_offset: false}
    # joint_vel: {noise_std: 0.2}
    joint_pos_multistep: {steps: 4, diff: true}
    joint_vel_multistep: {steps: 4, diff: true}
    prev_actions:        {steps: 3}
  priv:
    root_linvel_b:    {yaw_only: true}
    body_pos:         {body_names: [.*leg_link6, .*arm_link5], yaw_only: true}
    body_vel:         {body_names: [.*leg_link6, .*arm_link5], yaw_only: true}
    feet_height_map:  {feet_names: .*leg_link5 }
    applied_torques:  {actuator_name: base_legs}
    contact_indicator: {body_names: [".*leg_link6"], timing: false}
    joint_forces:     {}
    cum_error:        {}
    feet_orientation: {feet_names: .*leg_link7}
    # rewards:     {}
  params:
    motor_params:     {actuator_name: "base_legs"}
    body_materials:   {body_names: ".*leg_link6"}
    body_mass:        {body_names: [base_link, waist_yaw_link]}
  recon_target: # for DWL
    root_angvel_b:
    projected_gravity_b:
    joint_pos:
    joint_vel:
    root_linvel_b:
    feet_height_map:  {feet_names: .*leg_link6 }
    applied_torques:  {actuator_name: base_legs}
    joint_forces:
  symmetry: # for symmetry reward
    symmetry:         {body_names: [".*arm_link[4,6]", ".*leg_link[4,6]"]}
  aux_target_: # for HIM
    root_linvel_b:    {yaw_only: true}
    root_angvel_b:    {yaw_only: true}
    rewards:          {}
  # state_:
  #   joint_pos:
  #   joint_vel:
  # state_substep_:
  #   joint_pos_substep:
  #   joint_vel_substep:
  #   joint_pos_des_substep:

reward:
  loco:
    # linvel_exp:         {weight: 1.5, enabled: true, body_names: waist_yaw_link, yaw_only: true, dim: 2}
    # angvel_z_exp:       {weight: 1.5, enabled: true, body_name: waist_yaw_link,  world_frame: true}
    # angvel_xy_l2:       {weight: 0.2, enabled: true, body_name: waist_yaw_link}

    linvel_exp:         {weight: 1.5, enabled: true, yaw_only: true, dim: 3, gamma: 0.8, upright: true}
    angvel_z_exp:       {weight: 1.5, enabled: true, world_frame: true, gamma: 0.8}
    angvel_xy_l2:       {weight: 0.2, enabled: true, body_name: waist_yaw_link}

    linacc_z_l2:        {weight: 0.005, enabled: false}
    linvel_projection:  {weight: 1.0, enabled: true, yaw_only: true}

    linvel_z_l2:        {weight: 0.5, enabled: true}
    energy_l1:          {weight: 5.0e-4, enabled: true}
    joint_acc_l2:       {weight: 1.0e-8, enabled: false}
    joint_torques_l2:   {weight: 1.0e-4, enabled: true, joint_names: [".*arm_joint[1-4]", "waist_yaw_joint"]}
    joint_limits:       {weight: 0.5, enabled: true, joint_names: [.*arm_joint4, .*leg_joint4], offset: 0.06}
    # stand: 0.5
    root_orientation:   {weight: 0.5, enabled: true}
    survival:           {weight: 1.0, enabled: true}
    action_rate_l2:     {weight: 0.01, enabled: true}
    action_rate2_l2:    {weight: 0.005, enabled: true}
    feet_air_time:      {weight: 1.0, enabled: true,  body_names: .*leg_link6, thres: 0.4}
    feet_contact_count: {weight: 1.0, enabled: false, body_names: .*leg_link6}
    feet_swing:         {weight: 1.1, enabled: true,  feet_names: .*leg_link7}
    feet_step:          {weight: 1.0, enabled: true,  feet_names: .*leg_link7}
    leg_swing:          {weight: 1.0, enabled: true}
    feet_orientation:   {weight: 1.0, enabled: true,  feet_names: .*leg_link7}
    # arm_swing:          {weight: 1.0, enabled: true, arm_names: .*arm_link5}
    joint_deviation_l1: {weight: 0.2, enabled: false, joint_names: [".*leg_joint[2,3]"]}
    joint_deviation_l2: {weight: 0.1, enabled: true, joint_names: [".*arm_joint[1-4]", "waist_yaw_joint"]}
    joint_vel_l2:       {weight: 0.001, enabled: true, joint_names: [".*arm_joint[1-4]", waist_yaw_joint]}
    arm_well_being:     {weight: 4.0, enabled: false, arm_names: .*arm_link6}
    feet_clearance:     {weight: 2.0, enabled: true, feet_names: .*leg_link6}
    undesired_contact:  {weight: 0.2, enabled: true, body_names: .*arm_link.*}
    feet_impact:        {weight: 5.0e-6, enabled: true, feet_names: .*leg_link6}

randomization:
  push:     {body_names: ["base_link", "waist_yaw_link"], force_range: [0.0, 0.1]}
  perturb_body_mass:
    .*: [0.9, 1.1]
  perturb_body_materials:
    body_names: ".*leg_link6"
    static_friction_range: [0.6, 4.0]
    dynamic_friction_range: [0.6, 4.0]
    restitution_range: [0.0, 0.2]
  motor_params:
    actuator_name:    base_legs
    stiffness_range:
      .*arm_joint1:      [0.8, 1.2]
      .*arm_joint2:      [0.8, 1.2]
      .*arm_joint3:      [0.8, 1.2]
      .*arm_joint4:      [0.8, 1.2]
      .*arm_joint5:      [0.8, 1.2]
      .*arm_joint6:      [0.8, 1.2]
      .*leg_joint1:      [0.8, 1.2]
      .*leg_joint2:      [0.8, 1.2]
      .*leg_joint3:      [0.8, 1.2]
      .*leg_joint4:      [0.8, 1.2]
      .*leg_joint5:      [0.8, 1.2]
      .*leg_joint6:      [0.8, 1.2]
      waist_yaw_joint: [0.8, 1.2]
    damping_range:
      .*arm_joint1:      [0.8, 1.2]
      .*arm_joint2:      [0.8, 1.2]
      .*arm_joint3:      [0.8, 1.2]
      .*arm_joint4:      [0.8, 1.2]
      .*arm_joint5:      [0.8, 1.2]
      .*arm_joint6:      [0.8, 1.2]
      .*leg_joint1:      [0.8, 1.2]
      .*leg_joint2:      [0.8, 1.2]
      .*leg_joint3:      [0.8, 1.2]
      .*leg_joint4:      [0.8, 1.2]
      .*leg_joint5:      [0.8, 1.2]
      .*leg_joint6:      [0.8, 1.2]
      waist_yaw_joint: [0.8, 1.2]
    scale_factor_range:
      .*arm_joint.*:      [0.8, 1.2]
      .*leg_joint.*:      [0.8, 1.2]
      waist_yaw_joint: [0.8, 1.2]
    armatrue_range:   [0.0, 0.04]
  reset_joint_states_uniform:
    pos_ranges:
      .*arm_joint1: [-0.3, 0.3]
      .*arm_joint[2-5]: [-0.0, 0.0]
      .*leg_joint[2,3]: [-0.4, 0.0]
      .*leg_joint[1,4,5,6]: [-0.4, 0.4]
      waist_yaw_joint: [-0.3, 0.3]
    rel: true
  # stumble:  {body_names: ".*leg_link6", stumble_height: 0.045, friction_range: [0.4, 1.8]}

termination:
  crash: 
    body_names_expr: ["base_link", "[l,r]leg_link[1-5]", "[l,r]arm_link.*"]
    t_thres: 0.05
    min_time: 0.5
  fall_over: {xy_thres: 0.8}
  # feet_too_close: {feet_names: ".*leg_link6", thres: 0.11}
  # cum_error: {thres: 0.9}
