name: Go2Rough
task: Velocity

defaults:
  # see https://hydra.cc/docs/advanced/overriding_packages/
  - /task/Velocity@_here_
  - _self_

robot: go2
terrain: easy
payload: true

observation:
  policy:
    - "command"
    - "root_quat_w"
    - "root_angvel_b"
    - "projected_gravity_b"
    - "joint_pos"
    - "prev_actions"
    # - "motor_params"
  priv:
    - "joint_vel"
    # - "joint_acc"
    - "root_linvel_b"
    - "feet_pos_b"
    - "applied_torques"
    # - "payload_mass"
    # - "payload_inertia"
    - "flip_lr"
    - "flip_fb"
  static_embed:
    - "action_flip"

reward:
  linvel_exp: 1.0
  linvel_projection: 1.0
  heading: 0.5
  base_height: 0.5
  linvel_z_l2: 4.0
  energy_l1: 0.0001
  joint_acc_l2: 2.5e-7
  stand: 0.5
  orientation: 0.5
  survival: 0.5