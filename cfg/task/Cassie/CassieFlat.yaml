name: CassieRough
task: Biped

defaults:
  # see https://hydra.cc/docs/advanced/overriding_packages/
  - /task/Velocity@_here_
  - _self_

robot: cassie
terrain: plane
payload: false
homogeneous: false

command:
  _target_: active_adaptation.envs.mdp.Command2
  linvel_x_range: [-0.75, 1.5]
  linvel_y_range: [-0.5, 0.5]
  angvel_range: [-1.5, 1.5]
  yaw_stiffness_range: [0.5, 0.8]
  use_stiffness_ratio: 1.0
  stand_prob: 0.1

observation:
  policy:
    command:
    root_angvel_b: {noise_std: 0.05}
    projected_gravity_b: {noise_std: 0.05}
    joint_pos:    {noise_std: 0.05}
    joint_vel:    {noise_std: 0.2}
    prev_actions: {steps: 2}
  priv:
    applied_action:   {}
    joint_forces:     {}
  #   jacobians:        {body_names: .*toe}
    root_linvel_b:    {}
    feet_pos_b:       {}
    feet_vel_b:       {}
    feet_height_map:  {feet_names: .*toe}
    applied_torques:  {actuator_name: legs}
  #   motor_params:     {actuator_name: legs, homogeneous: "${task.homogeneous}"}
  #   body_materials:   {body_names: .*toe, homogeneous: "${task.homogeneous}"}
  #   body_mass:        {body_names: "pelvis"}
  #   # body_momentum:    {body_names: "pelvis"}
  #   cum_error:          {}
  #   last_rewards:       {}
  params:
    motor_params:     {actuator_name: legs, homogeneous: "${task.homogeneous}"}
    body_materials:   {body_names: .*toe, homogeneous: "${task.homogeneous}"}
    body_mass:        {body_names: "pelvis"}
  recon_target:
    root_angvel_b:
    projected_gravity_b:
    joint_pos:
    joint_vel:
    root_linvel_b:
    feet_pos_b:
    feet_vel_b:
    feet_height_map:  {feet_names: .*toe }
    applied_torques:  {actuator_name: legs}
    joint_forces:
  aux_target_:
    root_linvel_b:
    root_angvel_b:

reward:
  loco:
    linvel_exp:         {weight: 1.25, enabled: true}
    # linacc_z_l2:        {weight: 0.005}
    linvel_projection:  {weight: 1.0, enabled: false}
    angvel_z_exp:       {weight: 1.0, enabled: true}
    # linvel_z_l2:        {weight: 1.0, enabled: true}
    energy_l1:          {weight: 2.0e-4, enabled: true}
    joint_acc_l2:       {weight: 3.5e-8, enabled: true}
    joint_torques_l2:   {weight: 2.0e-5, enabled: true}
    # stand: 0.5
    orientation:        {weight: 0.5, enabled: true}
    survival:           {weight: 1.0, enabled: true}
    feet_air_time:      {weight: 2.0, enabled: true, body_names: .*_toe, thres: 0.75}
    feet_slip:          {weight: 1.0, enabled: false, body_names: .*_toe}
    feet_contact_count: {weight: 1.0, enabled: false, body_names: .*_toe}

randomization:
  perturb_body_mass:
    (?!pelvis).*: [0.7, 1.3]
    pelvis: [0.7, 2.0]
  perturb_body_materials:
    body_names: ".*toe"
    static_friction_range: [0.6, 2.0]
    dynamic_friction_range: [0.6, 2.0]
    homogeneous: ${task.homogeneous}
  motor_params:
    actuator_name:    legs
    stiffness_range:  [0.7, 1.3]
    damping_range:    [0.7, 1.3]
    strength_range:   [0.7, 1.3]
    homogeneous: ${task.homogeneous}
  reset_joint_states_uniform:
    pos_ranges:
      .*: [-0.2, 0.2]
    rel: true
  # stumble:  {body_names: ".*toe", stumble_height: 0.05, friction_range: [0.1, 2.0]}

termination:
  crash: 
    body_names_expr: ["pelvis"]
  cum_error: {thres: 0.9}