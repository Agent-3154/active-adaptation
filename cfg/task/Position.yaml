name: Position

defaults:
  # see https://hydra.cc/docs/advanced/overriding_packages/
  - /base/env_base@_here_
  - /base/sim_base@_here_

env:
  num_envs: 4096
  max_episode_length: 800

sim:
  dt: 0.005
  substeps: 4

randomization:
  train:
    base_mass: [0.8, 1.2]
    motor:
      p_gains: [0.8, 1.2]
      d_gains: [0.8, 1.2]
  eval:
    base_mass: [0.8, 1.2]
    motor:
      p_gains: [0.8, 1.2]
      d_gains: [0.8, 1.2]

action_scaling: 1.0
time_encoding: false