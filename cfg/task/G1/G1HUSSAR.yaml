# @package task
name: G1HUSSAR

viewer:
  resolution: [1280, 720]
  lookat: [0., 0., 0.]
  eye: [4.0, 4.0, 4.0]

robot: 
  name: g1_waist_unlocked
terrain: medium_curriculum

# common
num_envs: 4
max_episode_length: 1000

sim:
  step_dt: 0.02
  isaac_physics_dt: 0.005
  mujoco_physics_dt: 0.002

action:
  _target_: active_adaptation.envs.mdp.action.JointPosition
  action_scaling: 
    .*elbow_joint: 0.25
    .*shoulder.*: 0.25
    .*hip.*: 0.25
    .*knee.*: 0.25
    waist_yaw_joint: 0.25
    waist_roll_joint: 0.25
    waist_pitch_joint: 0.25
    .*ankle.*: 0.25
  max_delay: 1
  alpha: [0.8, 1.0]
  # custom_command:
  #   .*wrist_roll_joint: 0.
  #   .*wrist_pitch_joint: 0.
  #   .*wrist_yaw_joint: 0.

# command:
#   _target_: active_adaptation.envs.mdp.commands.hussar.LocoNavigation

command:
  _target_: active_adaptation.envs.mdp.Command2
  linvel_x_range: [-0.8, 1.4]
  linvel_y_range: [-0.8, 0.8]
  angvel_range: [-2.0, 2.0]
  yaw_stiffness_range: [0.5, 1.0]
  use_stiffness_ratio: 0.9
  stand_prob: 0.05
  curriculum: true

observation:
  # command:
  policy:
    command:
    root_angvel_b:  {noise_std: 0.05}
    gravity_multistep: {steps: 3, noise_std: 0.05}
    joint_pos_multistep: {steps: 3, noise_std: 0.05}
    joint_vel_multistep: {steps: 3, noise_std: 0.2}
    prev_actions: {steps: 3, permute: true}
  # priv:
    applied_action:   {}
    root_linvel_b:    {}
    # feet_pos_b:       {feet_names: .*ankle_roll_link}
    # feet_vel_b:       {feet_names: .*ankle_roll_link}
    # feet_height_map:  {feet_names: .*ankle_link }
    applied_torque:   {}
  height_scan:
    height_scan: {x_range: [-1, 1], y_range: [-1, 1], x_resolution: 0.2, y_resolution: 0.2, flatten: false}
  # grid_map:
  #   grid_map: {}
  base_height:
    body_height: {body_names: ["pelvis"]}

reward:
  loco:
    linvel_z_l2:            {weight: 0.5, enabled: true}
    angvel_xy_l2:           {weight: 0.025, enabled: true}
    orientation_isaaclab:   {weight: 1.5, enabled: true}
    action_rate_l2:         {weight: 0.005, enabled: true}
    action_rate2_l2:        {weight: 0.005, enabled: true} # smoothness
    # joint_deviation_l2:     {weight: 0.1, enabled: true, joint_names: [.*hip.*]}
    # joint_deviation_l2:     {weight: 0.25, enabled: true, joint_names: [.*ankle_roll.*]}
    # joint_deviation_l2:     {weight: 0.5, enabled: true, joint_names: [.*waist.*]}
    # joint_deviation_l2:     {weight: 0.05, enabled: true, joint_names: [.*shoulder.*, .*wrist.*, .*elbow.*]}
    joint_deviation_l2:     {weight: 0.1, enabled: true, 
      joint_names: {
        .*hip.*: 1.0,
        .*ankle_roll.*: 2.5,
        .*waist.*: 5.0,
        .*shoulder.*: 0.5,
        .*elbow.*: 0.5,
      }  
    }
    joint_acc_l2:           {weight: 2.5e-7, enabled: true}
    dof_pos_limits:         {weight: 2.0, enabled: true}
    feet_clearance_height:  {weight: 0.5, enabled: true, body_names: [.*ankle_roll_link], height_target: 0.02, relative_height: 0.64}
    feet_distance_lateral:  {weight: 0.5, enabled: true, body_names: [.*ankle_roll.*], least_distance: 0.2, most_distance: 0.35}
    knee_distance_lateral:  {weight: 1.0, enabled: true, body_names: [.*hip_yaw.*, ".*knee.*"], least_distance: 0.2, most_distance: 0.35}
    # feet_ground_parallel:   {weight: 0.5, enabled: true, body_names: .*ankle_roll_link}
    feet_parallel:          {weight: 0.5, enabled: true, body_names: .*ankle_roll_link}
    energy_l2:              {weight: 2.0e-5, enabled: true}
    feet_stumble:           {weight: 0.5, enabled: true, body_names: .*ankle_roll_link}
    stand_still:            {weight: 0.5, enabled: true, body_names: .*ankle_roll_link}
    torques_scaled:         {weight: 2.5e-6, enabled: true}
    dof_vel:                {weight: 1.0e-4, enabled: true}
    dof_vel_limits:         {weight: 2.0e-3, enabled: true}
    torque_limits:          {weight: 0.1, enabled: true}
    single_foot_contact:    {weight: 0.75, enabled: true, body_names: [.*ankle_roll_link], margin: 0} # no_fly
    feet_contact_forces:    {weight: 2.5e-4, enabled: true, body_names: [.*ankle_roll_link], max_contact_force: 400.0}
    contact_momentum:       {weight: 2.5e-4, enabled: true, body_names: [.*ankle_roll_link]}
    # action_vanish:          {weight: 0.1, enabled: true} 
    # velocity_direction:     {weight: 1.0, enabled: true}
    # reach_target_pos:       {weight: 1.0, enabled: true}
    # reach_target_yaw:       {weight: 1.0, enabled: true}
    # reaching_target:        {weight: 1.0, enabled: true}
    linvel_x_exp:       {weight: 1.5, enabled: true}
    linvel_y_exp:       {weight: 1.0, enabled: true}
    linvel_projection:  {weight: 0.5, enabled: true}
    angvel_z_exp:       {weight: 1.2, enabled: true, gamma: 0.8}
    tracking_base_height:   {weight: 2.0, enabled: true, target_height: 0.74}
  debug:
    feet_slip:              {weight: 0.25, enabled: false, body_names: [.*ankle_roll_link]}
    feet_contact_count: {weight: 1.0, enabled: false, body_names: .*ankle_roll_link}

randomization:
  perturb_body_mass:
    (?!(pelvis|torso_link)).*: [0.8, 1.2]
    pelvis: [0.8, 1.2]
  perturb_body_materials:
    body_names: ".*ankle_roll_link"
    static_friction_range: [0.6, 4.0]
    dynamic_friction_range: [0.6, 4.0]
    restitution_range: [0.0, 0.2]
  motor_params_implicit:
    stiffness_range:
      .*: [0.8, 1.1]
    damping_range:
      .*: [0.8, 1.1]
    armature_range:
      .*: [0.0, 0.01]
  reset_joint_states_uniform:
    pos_ranges:
      .*: [-0.1, 0.1]
    rel: true
  # impulse: {}

termination:
  crash: 
    body_names_expr:
    - "pelvis"
    - "torso_link"
    - ".*_hip_.*_link"
    - ".*shoulder_.*_link"
    - ".*(wrist|elbow).*"
  fall_over: {xy_thres: 0.9}