name: Go2M_umi
task: QuadrupedManip

defaults:
  # see https://hydra.cc/docs/advanced/overriding_packages/
  - /task/Velocity@_here_
  - override action: null
  - _self_

robot: go2abp
terrain: plane
payload: false
homogeneous: false

action:
  _target_: active_adaptation.envs.mdp.action.QuadrupedAndArm
  regular_joints: ^(?!(endleft|endright|joint.*)$).*
  gripper_joints: end(left|right)
  action_scaling:
    .*_joint: 0.5
    # joint[1-6]: 0.25
  max_delay: 1
  alpha: 0.8

command:
  _target_: active_adaptation.envs.mdp.CommandEEPose_UMI
  ee_name: gripper
  ee_base_name: arm_base
  pos_obs_scale: 1.0
  orn_obs_scale: 1.0
  pos_err_sigma: 0.25
  orn_err_sigma: 0.25
  pos_sigma_curriculum:
    2.0: 0.25
    0.2: 0.2
    0.1: 0.1
    0.05: 0.05
  orn_sigma_curriculum:
    2.0: 0.25
    0.2: 0.2
    0.1: 0.1
    0.05: 0.05
  smoothing_dt_multiplier: 0.25
  episode_length: ${..max_episode_length}
  target_times:
  # - 0.02
  # - 0.04
  # - 0.06
  # - 1.0
  - 0.02
  - 0.2
  - 0.4
  - 0.6
  ee_lin_vel_range: [0.1, 1.0]
  lin_vel_x_range: [-1.0, 1.4]
  lin_vel_y_range: [-0.5, 0.5]
  ang_vel_range: [-1.5, 1.5]
  yaw_range: [-2.5, 2.5]
  pitch_range: [-1.5, 0.5]
  radius_range: [0.4, 0.8]

observation:
  policy:
    command:
    # root_quat_w:
    root_angvel_b: {noise_std: 0.05}
    projected_gravity_b: {noise_std: 0.05}
    joint_pos:    {noise_std: 0.05}
    joint_vel:    {noise_std: 0.2}
    prev_actions: {steps: 3}

    root_linvel_b:
    joint_forces: {}
    # jacobians:    {body_names: [.*_foot, gripper]}
    ee_pos:       {ee_name: gripper}
    ee_ori:       {ee_name: gripper}
    ee_vel:       {ee_name: gripper}
    feet_pos_b:   {feet_names: .*foot}
    feet_height_map: {}
    contact_indicator: {body_names: [".*_foot"], timing: true}
    # cum_error:    {}
    # rewards:      {}
  aux_target_:
    ee_vel:       {ee_name: gripper}

reward:
  loco:
    survival:           {weight: 2.0, enabled: true}
    base_height_l1:     {weight: 1.0, enabled: true, target_height: 0.3}
    undesired_contact:  {body_names: [.*_calf, .*thigh], weight: 0.25, enabled: true}

    # regularizations
    orientation:        {weight: 1.0, enabled: true}
    quadruped_stand:    {weight: 0.25, enabled: true}
    energy_l1:          {weight: 0.0002, enabled: true}
    energy_dist_lr:     {weight: 0.0002, enabled: true}
    action_rate_l2:     {weight: 0.01, enabled: true}
    action_rate2_l2:    {weight: 0.005, enabled: true}
    joint_acc_l2:       {weight: 2.5e-7, enabled: true, joint_names: ".*"}
    joint_torques_l2:   {weight: 2.0e-4, enabled: true, joint_names: ".*_joint"}

    # locomotion
    base_lin_vel_exp: {weight: 1.5, enabled: true, l: 0.25}
    base_lin_vel_projection: {weight: 0.5, enabled: true}
    base_ang_vel_exp: {weight: 0.75, enabled: true, l: 0.25}
    
    # regularizations
    linvel_z_l2:        {weight: 2.0, enabled: true}
    angvel_xy_l2:       {weight: 0.25, enabled: true}
    feet_air_time:      {weight: 0.5, enabled: true, body_names: .*_foot, thres: 0.4}
    feet_contact_count: {weight: 1.0, enabled: false, body_names: .*_foot}
    feet_slip:          {weight: 0.5, enabled: false, body_names: .*_foot}
    joint_pos_l2_penalty: {weight: 0.25, enabled: false}
  
  manip:
    survival:           {weight: 1.0, enabled: true}
    # manipulation
    # ee_pos_exp_linear: {weight: 1.0, enabled: true, l: 0.25}
    # ee_orn_exp_linear: {weight: 1.0, enabled: true, l: 0.25}
    # ee_pos_umi:    {weight: 1.0, enabled: false}
    # ee_orn_umi:    {weight: 1.0, enabled: false}
    ee_pos_exp_linear: {weight: 1.0, enabled: false, l: 0.25}
    ee_orn_exp_linear: {weight: 1.0, enabled: false, l: 0.25}
    ee_pos_umi:    {weight: 1.0, enabled: true}
    ee_orn_umi:    {weight: 1.0, enabled: true}
    ee_pose_umi:    {weight: 4.0, enabled: false}

    ee_pos_error_umi:    {weight: 1.0, enabled: false}
    ee_orn_error_umi: {weight: 1.0, enabled: false}
    ee_past_pos_error_umi:    {weight: 1.0, enabled: false}
    ee_past_orn_error_umi: {weight: 1.0, enabled: false}

    ee_pos_sigma_umi: {weight: 1.0, enabled: false}
    ee_orn_sigma_umi: {weight: 1.0, enabled: false}

    # regularizations
    ee_acc_penalty:     {weight: 2e-4, enabled: true, ee_name: gripper}
    ee_angvel_penalty:  {weight: 0.02, enabled: true, ee_name: gripper}
    ee_acc_l2:          {weight: 1.0, enabled: false, ee_name: gripper}

    joint_vel_penalty: {weight: 0.02, enabled: true, joint_name: joint.*}
    joint_acc_penalty: {weight: 1e-4, enabled: true, joint_name: joint.*}

    # base_joint_ang_vel_pd_exp: {weight: 2.0, enabled: true, base_joint_name: joint1, kp: 1.0, kd: 0.2, l: 0.1}
    # arm_joint_acc_penalty: {weight: 2e-4, enabled: true}
    # arm_joint_acc_l1: {weight: 1.0, enabled: false}

termination:
  crash: {body_names_expr: [Head.*, "base", "arm_link.*"], t_thres: 0.4, z_thres: 0.}
  # joint_acc_exceeds: {thres: 5000}
  # ee_cum_error: {thres: [8.0, 8.0]}

randomization:
#   random_scale: [1.0, 1.2]
#   perturb_body_mass:
#     (?!(payload|base|Head.*)).*: [0.8, 1.2]
#     base: [0.8, 1.2]
#     Head.*: [25.0, 250.0]
  perturb_body_materials:
    body_names: ".*_foot"
    static_friction_range:  [0.6, 2.0]
    dynamic_friction_range: [0.6, 2.0]
    restitution_range:      [0.0, 0.2]
    homogeneous: true # ${task.homogeneous}
  # motor_params:
  #   actuator_name: arm
  #   stiffness_range:  [0.8, 1.2]
  #   damping_range:    [0.8, 1.2]
  #   homogeneous: ${task.homogeneous}
#   # random_motor_failure:
#   #   actuator_name: base_legs
#   #   joint_names: .*_calf_joint
#   #   failure_prob: 0.0
  # drag: {body_names: gripper, drag_range: [0.001, 0.002]}
  reset_joint_states_uniform:
    pos_ranges:
      joint1: [-2.5, 2.5]
      joint2: [0.0, 1.0]
      joint3: [-2.5, 0.0]
      joint4: [-1.0, 1.0]
      joint5: [-1.0, 1.0]
      joint6: [-2.5, 2.5]
      .*_joint: [-0.4, 0.4]
    rel: true
  # push: {body_names: ["base"], force_range: [0.2, 0.8], min_interval: 200}
  stumble: {body_names: .*_foot, stumble_height: 0.03, friction_range: [0.0, 0.2]}
