name: H1Rough
task: Humanoid

defaults:
  # see https://hydra.cc/docs/advanced/overriding_packages/
  - /task/Velocity@_here_
  - _self_

robot: h1
terrain: easy
payload: false

observation:
  policy:
    command:
    root_quat_w:
    root_angvel_b:
    projected_gravity_b:
    joint_pos: {noise_std: 0.05}
    joint_vel: {noise_std: 0.2}
    prev_actions:
    # - "motor_params"
  priv:
    # joint_acc:
    root_linvel_b:
    feet_pos_b:
    body_pos: {body_names: ".*elbow_link"} 
    applied_torques: {actuator_name: base_legs}
    contact_indicator: {body_names: ".*ankle_link"}
  height_scan:
    height_scan: 
  
reward:
  linvel_exp: 1.0
  linvel_projection: 1.0
  angvel_z_exp: 0.75
  linvel_z_l2: 2.0
  energy_l1: 0.001
  joint_acc_l2: 3.5e-8
  # stand: 0.5
  orientation: 0.5
  survival: 1.0

randomization:
  push: {body_names: ["pelvis", ".*shoulder_pitch_link"]}
  motor_params:
    actuator_name: base_legs
    stiffness_range: [0.8, 1.2]
    damping_range: [0.8, 1.2]
  reset_joint_states_uniform:
    pos_ranges:
      torso_joint: [-1., 1.]
      .*elbow.*: [-0.8, 0.8]
      .*shoulder.*: [-0.8, 0.8]

termination:
  crash: 
    body_names_expr: ["pelvis", "torso_link", ".*elbow_link"]
