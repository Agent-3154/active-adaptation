name: Go2Pos
task: Quadruped

defaults:
  # see https://hydra.cc/docs/advanced/overriding_packages/
  - /task/Velocity@_here_
  - _self_

robot: go2
terrain: plane
payload: false

# command:
#   _target_: active_adaptation.envs.mdp.Command1
#   speed_range: [0.4, 2.0]
#   angvel_range: [-1.4, 1.4]
#   base_height_range: [0.2, 0.35]
#   stand_prob: 0.1

# command:
#   _target_: active_adaptation.envs.mdp.Command2
#   linvel_x_range: [-1.0, 1.2]
#   linvel_y_range: [-0.3, 0.3]
#   angvel_range: [-1.0, 1.0]
#   base_height_range: [0.25, 0.35]
#   stand_prob: 0.15

command:
  _target_: active_adaptation.envs.mdp.CommandPosTracking

observation:
  policy:
    command:
    root_quat_w:
    root_angvel_b:
    projected_gravity_b:
    joint_pos: {noise_std: 0.05}
    joint_vel: {noise_std: 0.2}
    prev_actions: 
    # - "motor_params"
    root_linvel_b:
  priv:
    root_linvel_b:
    feet_pos_b:
    # feet_vel_b:
    applied_torques: {actuator_name: base_legs}
    contact_indicator: {body_names: ".*_foot"}

reward:
  tracking_error_exp: {weight: 1.5, enabled: true}
  linacc_z_l2:        {weight: 0.002}
  # angvel_z_exp:       {weight: 0.75, enabled: true}
  angvel_xy_l2:       {weight: 0.02, enabled: false}
  base_height_l1:     {weight: 2.0, enabled: false, target_height: 0.3}
  linvel_z_l2:        {weight: 1.0, enabled: false}
  energy_l1:          {weight: 0.0002, enabled: true}
  joint_acc_l2:       {weight: 2.5e-7, enabled: false}
  joint_torques_l2:   {weight: 2.0e-4, enabled: false}
  # stand: {weight: 0.5}
  orientation:        {weight: 1.0, enabled: false}
  survival:           {weight: 0.25, enabled: false}
  # action_rate_l2:     {weight: 0.01}
  # action_rate2_l2:    {weight: 0.01}
  # impact_force: {body_names: .*_foot, weight: 1.0}
  feet_air_time:      {weight: 1.0, enabled: false, thres: 0.5}
  feet_slip:          {weight: 1.0, enabled: false}
  feet_contact_count: {weight: 1.0, enabled: false}
  undesired_contact:  {body_names: [Head.*, .*_calf], weight: 10.}

termination:
  crash: {body_names_expr: ["base", ".*_hip", ".*_thigh"]}
  tracking_error: {tracking_error_threshold: 1.0}

randomization:
  perturb_body_mass:
    .*: [0.8, 1.2]
  perturb_body_materials:
    body_names: ".*_foot"
    static_friction_range: [0.6, 2.0]
    dynamic_friction_range: [0.6, 2.0]
  motor_params:
    actuator_name: base_legs
    stiffness_range: [0.7, 1.3]
    damping_range: [0.7, 1.3]
  reset_joint_states_scale:
    pos_scales:
      .*: [0.8, 1.2]

