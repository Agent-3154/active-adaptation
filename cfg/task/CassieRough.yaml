name: CassieRough
task: Biped

defaults:
  # see https://hydra.cc/docs/advanced/overriding_packages/
  - /task/Velocity@_here_
  - _self_

robot: cassie
terrain: easy
payload: false

observation:
  policy:
    - "command"
    - "root_linvel_b"
    - "joint_vel"
    - "root_quat_w"
    - "root_angvel_b"
    - "projected_gravity_b"
    - "joint_pos"
    - "prev_actions"
    - "motor_params"
  priv:
    - "joint_vel"
    # - "joint_acc"
    - "root_linvel_b"
    - "feet_pos_b"
    - "applied_torques"
    # - "contact_indicator"
    # - "contact_forces"
    # - "payload_mass"
    # - "payload_inertia"
  # static_embed:
  #   - "action_flip"
  # env:
  #   - "motor_params"
  #   - "payload_mass"
  #   - "motor_failure"

reward:
  linvel_exp: 1.0
  linvel_projection: 1.0
  heading: 0.5
  base_height: 0.5
  linvel_z_l2: 4.0
  energy_l1: 0.0001
  joint_acc_l2: 5e-7
  stand: 0.5
  orientation: 0.5
  survival: 0.5