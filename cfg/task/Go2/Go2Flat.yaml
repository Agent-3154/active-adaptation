# @package task
name: Go2Flat
task: Quadruped

defaults:
  # see https://hydra.cc/docs/advanced/overriding_packages/
  - /task/Velocity@_here_
  - override /task/action@action: null
  - _self_

robot: go2
terrain: plane
payload: false
homogeneous: false

action:
  _target_: active_adaptation.envs.mdp.action.JointPosition
  joint_names: .*_joint
  action_scaling: {.*_joint: 0.5}
  max_delay: 2
  alpha: [0.5, 1.0]

command:
  _target_: active_adaptation.envs.mdp.Command2
  linvel_x_range: [-1.0, 2.0]
  linvel_y_range: [-0.5, 0.5]
  angvel_range:   [-2.0, 2.0]
  yaw_stiffness_range: [0.5, 0.7]
  use_stiffness_ratio: 0.5
  aux_input_range: [1., 1.]
  resample_prob: 0.5
  stand_prob: 0.05
  target_yaw_range: 
    - [-0.3927,  0.3927]
    - [ 1.1781,  1.9635]
    - [ 2.7489,  3.5343]
    - [ 4.3197,  5.1051]

observation:
  policy:
    command:
    # root_angvel_b: {noise_std: 0.05}
    projected_gravity_b: {noise_std: 0.05}
    joint_pos:    {noise_std: 0.05, joint_names: .*_joint}
    joint_vel:    {noise_std: 0.4, joint_names: .*_joint}
    prev_actions: {steps: 3}
    # motor_params: {actuator_name: base_legs, homogeneous: "${task.homogeneous}"}
    # body_materials: {body_names: .*foot, homogeneous: "${task.homogeneous}"}
    # root_linvel_b:
    # # feet_pos_b:
    # feet_height_map: {feet_names: .*foot }
    # applied_torques: {actuator_name: base_legs}
  priv:
    # _mask_: true # randomly mask one of the items
    applied_action:
    root_linvel_b:    {yaw_only: true}
    root_angvel_b:
    feet_pos_b:
    feet_vel_b:
    feet_height_map:  {feet_names: .*foot }
    applied_torques:  {actuator_name: base_legs}
    joint_forces:     {joint_names: .*_joint}
    # motor_params:     {actuator_name: base_legs, homogeneous: "${task.homogeneous}"}
    # body_materials:   {body_names: .*foot, homogeneous: "${task.homogeneous}"}
    # motor_failure:    {actuator_name: base_legs}
    # body_scale:       {}
    # body_mass:        {body_names: [Head.*, "base", ".*_hip", ".*_thigh"]}
    # body_momentum:    {body_names: [Head.*, "base", ".*_hip", ".*_thigh"]}
    # rewards:          {}
    contact_indicator: {body_names: [".*_foot"], timing: true}
    cum_error:
  params:
    motor_params:     {actuator_name: base_legs, homogeneous: "${task.homogeneous}"}
    body_materials:   {body_names: .*foot, homogeneous: "${task.homogeneous}"}
    body_mass:        {body_names: [Head.*, "base", ".*_hip", ".*_thigh"]}
  recon_target_:
    root_angvel_b:
    projected_gravity_b:
    joint_pos:
    joint_vel:
    root_linvel_b:
    feet_height_map:  {feet_names: .*foot }
    applied_torques:  {actuator_name: base_legs}
    joint_forces:
  aux_target_:
    root_linvel_b:
    root_angvel_b:
    rewards: {}

reward:
  loco:
    linvel_exp:         {weight: 1.5, enabled: true, dim: 3, yaw_only: true}
    angvel_z_exp:       {weight: 0.75, enabled: true}
    linvel_projection:  {weight: 0.5, enabled: false, yaw_only: true}
    angvel_xy_l2:       {weight: 0.02, enabled: true}
    linvel_z_l2:        {weight: 2.0, enabled: true}
    base_height_l1:     {weight: 0.5, enabled: true, target_height: 0.3}
    energy_l1:          {weight: 0.0002, enabled: true}
    energy_dist_lr:     {weight: 0.0002, enabled: false}
    energy_dist_fb:     {weight: 0.0002, enabled: false}
    joint_acc_l2:       {weight: 2.5e-7, enabled: true}
    joint_torques_l2:   {weight: 2.0e-4, enabled: true}
    quadruped_stand:    {weight: 0.5}
    survival:           {weight: 1.0, enabled: true}
    action_rate_l2:     {weight: 0.01, enabled: true}
    action_rate2_l2:    {weight: 0.005, enabled: true}
    feet_air_time:      {weight: 0.4, enabled: true, body_names: .*_foot, thres: 0.4}
    feet_slip:          {weight: 1.0, enabled: false, body_names: .*_foot}
    feet_contact_count: {weight: 1.0, enabled: false, body_names: .*_foot}
    undesired_contact:  {body_names: [.*_calf, .*thigh], weight: 0.25, enabled: true}
    feet_swing_height:  {weight: 0.1, enabled: true, target_height: -0.2}

termination:
  crash: {body_names_expr: [Head.*, "base"], t_thres: 0.5, z_thres: 0.}
  # joint_acc_exceeds: {thres: 5000}
  cum_error: {thres: 0.9}

randomization:
  perturb_body_mass:
    (?!(payload|base|Head.*)).*: [0.8, 1.2]
    base: [0.8, 1.4]
    Head.*: [25.0, 250.0]
  perturb_body_materials:
    body_names: ".*_foot"
    static_friction_range:  [0.5, 2.0]
    dynamic_friction_range: [0.5, 2.0]
    restitution_range:      [0.0, 0.2]
    homogeneous: true # ${task.homogeneous}
  motor_params:
    actuator_name: base_legs
    stiffness_range:  [0.7, 1.3]
    damping_range:    [0.7, 1.3]
    armature_range:   [0.0, 0.02]
    homogeneous: ${task.homogeneous}
  # random_motor_failure:
  #   actuator_name: base_legs
  #   joint_names: .*_calf_joint
  #   failure_prob: 0.0
  reset_joint_states_scale:
    pos_scales:
      .*: [0.8, 1.2]
  # push: {body_names: ["base"], force_range: [0.2, 0.8], min_interval: 200}
  # stumble: {body_names: .*_foot}
