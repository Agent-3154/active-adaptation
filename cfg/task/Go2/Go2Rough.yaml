# @package task
name: Go2Rough
task: Quadruped

defaults:
  # see https://hydra.cc/docs/advanced/overriding_packages/
  - /task/Go2/Go2Flat@_here_
  - _self_

terrain: medium # easy

observation:
  height_scan:
    height_scan:      {prim_path: base}

reward:
  loco:
    linvel_exp:         {weight: 1.5, enabled: false, dim: 2, yaw_only: true}
    angvel_z_exp:       {weight: 0.75, enabled: false}
    tracking_lin_vel:   {weight: 1.5, enabled: true}
    tracking_yaw:   {weight: 1.0, enabled: true}
    feet_air_time:      {weight: 0.2, enabled: true, body_names: .*_foot, thres: 0.4}
