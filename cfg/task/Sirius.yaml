# @package task
name: Sirius
task: Quadruped

defaults:
  # see https://hydra.cc/docs/advanced/overriding_packages/
  - /task/Velocity@_here_
  - override /task/action@action: null
  - _self_

robot:
  name: sirius

terrain: plane
payload: false
homogeneous: false

action:
  _target_: active_adaptation.envs.mdp.action.LegWheel
  leg_scaling: {.*_(HAA|HFE|KFE): 0.5}
  wheel_scaling: {wheel_.*: 2.0}

command:
  _target_: active_adaptation.envs.mdp.commands.sirius.SiriusCommandManager
  # _target_: active_adaptation.envs.mdp.Command2
  # linvel_x_range: [-1.0, 1.6]
  # linvel_y_range: [-0.7, 0.7]
  # angvel_range:   [-2.0, 2.0]
  # yaw_stiffness_range: [0.5, 0.7]
  # use_stiffness_ratio: 0.99
  # aux_input_range: [.5, 1.]
  # resample_prob: 0.5
  # stand_prob: 0.08
  # target_yaw_range: 
  #   - [-0.3927,  0.3927]
  #   - [ 1.1781,  1.9635]
  #   - [ 2.7489,  3.5343]
  #   - [ 4.3197,  5.1051]
  # adaptive: true

observation:
  command_mode_: # won't be normalized
    command_mode:
  command_end_: # won't be normalized
    command_end:
  command_: # won't be normalized
    command:
  policy:
    projected_gravity_b: {noise_std: 0.05}
    # joint_pos:    {noise_std: 0.05, joint_names: }
    # joint_vel:    {noise_std: 0.3, joint_names: .*}
    joint_pos_multistep: {steps: 4, noise_std: 0.05, joint_names: .*_(HAA|HFE|KFE)}
    joint_vel_multistep: {steps: 4, noise_std: 0.2, joint_names: .*}
    prev_actions: {steps: 3}
  priv:
    applied_action:
    root_linvel_b:    {yaw_only: true}
    root_angvel_b:
    feet_pos_b:       {feet_names: .*_WHEEL}
    feet_vel_b:       {feet_names: .*_WHEEL}
    feet_height_map:  {feet_names: .*_WHEEL }
    applied_torques:  {actuator_name: base_legs}
    external_forces:  {body_names: ["base"]}
    cum_error:
    body_height:      {body_names: ["front", "back"]}

reward:
  _clip_: true
  loco:
    lin_vel_exp:        {weight: 1.5, enabled: true}
    ang_vel_z_exp:      {weight: 1.0, enabled: true}
    pitch_exp:          {weight: 1.5, enabled: true}

    # stand_lin_vel:      {weight: 2.0, enabled: true}
    # stand_height:       {weight: 2.0, enabled: true}
    
    jump_roll:          {weight: 2.0, enabled: true}
    jump_height:        {weight: 4.0, enabled: true}
    # jump_lin_vel:       {weight: 2.0, enabled: true}
    jump_ang_vel:       {weight: 1.0, enabled: true}

  # reg:
    walk_angvel_xy_l2:  {weight: 0.02, enabled: true}
    walk_linvel_z_l2:   {weight: 2.0, enabled: true}
    energy_l1:          {weight: 0.0001, enabled: true}
    joint_acc_l2:       {weight: 2.5e-7, enabled: true}
    joint_torques_l2:   {weight: 1.0e-4, enabled: true}
    survival:           {weight: 1.0, enabled: true}
    action_rate_l2:     {weight: 0.01, enabled: true}
    action_rate2_l2:    {weight: 0.002, enabled: true}
    # feet_air_time:      {weight: 0.2, enabled: true, body_names: .*_WHEEL, thres: 0.4}
    undesired_contact:  {body_names: ["base", "thigh_.*", "shank_.*"], weight: 0.25, enabled: true}
  debug:
    feet_slip:          {weight: 1.0, enabled: false, body_names: .*_WHEEL}
    feet_contact_count: {weight: 1.0, enabled: false, body_names: .*_WHEEL}

termination:
  crash: {body_names_expr: ["base", "front", "back", "thigh_.*"], t_thres: 0.01}
  jump_error_exceeds: {}
  stand_error_exceeds: {}

randomization:
  perturb_body_mass:
    (?!(payload|base|Head.*)).*: [0.8, 1.2]
    base: [0.8, 1.2]
  perturb_body_materials:
    body_names: ".*_WHEEL"
    static_friction_range:  [0.5, 4.0]
    dynamic_friction_range: [0.5, 4.0]
    restitution_range:      [0.0, 0.5]
    homogeneous: true # ${task.homogeneous}
  # motor_params:
  #   actuator_name: base_legs
  #   stiffness_range:  
  #     F[L,R]_hip_joint:   [0.9, 1.1]
  #     F[L,R]_thigh_joint: [0.9, 1.1]
  #     F[L,R]_calf_joint:  [0.9, 1.1]
  #     R[L,R]_hip_joint:   [0.9, 1.1]
  #     R[L,R]_thigh_joint: [0.9, 1.1]
  #     R[L,R]_calf_joint:  [0.9, 1.1]
  #   damping_range:
  #     F[L,R]_hip_joint:   [0.9, 1.1]
  #     F[L,R]_thigh_joint: [0.9, 1.1]
  #     F[L,R]_calf_joint:  [0.9, 1.1]
  #     R[L,R]_hip_joint:   [0.9, 1.1]
  #     R[L,R]_thigh_joint: [0.9, 1.1]
  #     R[L,R]_calf_joint:  [0.9, 1.1]
  #   scale_factor_range:
  #     .*_hip_joint:   [0.9, 1.1]
  #     .*_thigh_joint: [0.9, 1.1]
  #     .*_calf_joint:  [0.9, 1.1]
  reset_joint_states_scale:
    pos_scales:
      .*: [0.8, 1.2]
  # external_force: {}