name: Go2Rough
task: Quadruped

defaults:
  # see https://hydra.cc/docs/advanced/overriding_packages/
  - /task/Velocity@_here_
  - _self_

robot: go2
terrain: medium
payload: false

observation:
  policy:
    - "command"
    - "root_quat_w"
    - "root_angvel_b"
    - "projected_gravity_b"
    - "joint_pos"
    - "joint_vel"
    - "prev_actions"
    - "incoming_wrench"
    # - "motor_params"
    # - "body_masses"

reward:
  linvel_exp: 1.5
  linvel_projection: 1.0
  # heading: 0.5
  angvel_z_exp: 0.5
  angvel_xy_l2: 0.02
  # base_height: 0.5
  linvel_z_l2: 1.0
  # energy_l1: 0.0001
  joint_acc_l2: 5e-7
  stand: 0.5
  orientation: 0.25
  survival: 0.5
  # feet_slip: 0.2
  action_rate_l2: 0.01
  # feet_air_time: 0.01
  joint_torques_l2: 2e-4