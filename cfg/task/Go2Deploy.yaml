name: Go2Rough
task: Quadruped

defaults:
  # see https://hydra.cc/docs/advanced/overriding_packages/
  - /task/Velocity@_here_
  - _self_

robot: go2
terrain: medium
payload: false

observation:
  policy:
    - "command"
    - "root_quat_w"
    - "root_angvel_b"
    - "projected_gravity_b"
    - "joint_pos"
    - "joint_vel"
    - "prev_actions"
    # - "motor_params"
    # - "body_masses"

reward:
  linvel_exp: 1.0
  linvel_projection: 1.0
  heading: 0.5
  base_height: 0.5
  linvel_z_l2: 4.0
  energy_l1: 0.0001
  joint_acc_l2: 2.5e-7
  stand: 0.5
  orientation: 0.5
  survival: 0.5
  feet_slip: 0.2