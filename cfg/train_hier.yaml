hydra:
  run:
    dir: ./outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}-${task.name}-${algo.name}

headless: true
exp_name: ${oc.select:task.name,test}-${oc.select:algo.name,none}

app:
  headless: ${..headless}
  enable_cameras: ${..eval_render}

sim: ${task.sim}
# env: ${task.env}

total_frames: 150_000_000
max_iters: -1
eval_interval: -1
eval_render: false
save_interval: 150
seed: 0
checkpoint_path: null
vecnorm: ${oc.select:algo.vecnorm,train}

camera_follow: true

wandb:
  name: ${..exp_name}/${now:%m-%d}_${now:%H-%M}
  job_type: train
  entity: btx0424
  project: adaptation
  mode: online # set to 'disabled' when debugging locally

defaults:
  - task: Velocity
  - algo: ppo
  - _self_
