hydra:
  run:
    dir: ./outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}-${task.name}-${algo.name}

headless: true
offscreen_render: ${eval_render}

app:
  headless: ${..headless}
  enable_cameras: false

sim: ${task.sim}
# env: ${task.env}

total_frames: 150_000_000
max_iters: -1
eval_interval: -1
eval_render: false
save_interval: 150
seed: 0
checkpoint_path: null
vecnorm: ${oc.select:algo.vecnorm,train}

camera_follow: true

wandb:
  group: ${oc.select:..task.name}
  run_name: ${oc.select:..task.name,test}-${oc.select:..algo.name,none}
  job_type: train
  entity: btx0424
  project: adaptation
  mode: online # set to 'disabled' when debugging locally
  run_id: 
  monitor_gym: True
  tags: 

defaults:
  - task: Velocity
  - algo: ppo
  - _self_
